<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MinerU Proxy 配置管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 30px;
            border-radius: 12px 12px 0 0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        
        .header h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 28px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .card {
            background: white;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 18px;
            border-left: 4px solid #667eea;
            padding-left: 12px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-group.checkbox {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .form-group.checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            cursor: pointer;
        }
        
        .form-group.checkbox label {
            margin: 0;
            margin-bottom: 0;
            cursor: pointer;
        }
        
        .help-text {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #ddd;
        }
        
        .btn-secondary:hover {
            background: #e8e8e8;
        }
        
        .btn-test {
            background: #48bb78;
            color: white;
        }
        
        .btn-test:hover {
            background: #38a169;
        }
        
        .status {
            padding: 12px 16px;
            border-radius: 6px;
            margin-top: 12px;
            font-size: 14px;
            display: none;
        }
        
        .status.success {
            background: #c6f6d5;
            color: #22543d;
            border-left: 4px solid #48bb78;
            display: block;
        }
        
        .status.error {
            background: #fed7d7;
            color: #742a2a;
            border-left: 4px solid #f56565;
            display: block;
        }
        
        .status.info {
            background: #bee3f8;
            color: #2c5282;
            border-left: 4px solid #4299e1;
            display: block;
        }
        
        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 600px) {
            .config-grid {
                grid-template-columns: 1fr;
            }
            
            .header {
                padding: 20px;
            }
            
            .card {
                padding: 20px;
            }
        }
        
        .api-key-display {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            word-break: break-all;
            margin-top: 8px;
            font-size: 12px;
            max-height: 60px;
            overflow-y: auto;
        }
        
        .connection-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        .connection-status.connected {
            background: #48bb78;
        }
        
        .connection-status.disconnected {
            background: #cbd5e0;
        }
        
        .note {
            background: #fffaf0;
            border-left: 4px solid #ed8936;
            padding: 12px;
            border-radius: 6px;
            margin: 15px 0;
            font-size: 13px;
            color: #744210;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 MinerU Proxy 配置管理</h1>
            <p>配置 API Key 和 PDF 分片参数</p>
        </div>
        
        <!-- API Key 配置 -->
        <div class="card">
            <h2>🔑 API Key 配置</h2>
            
            <div class="form-group">
                <label>MinerU API Key</label>
                <input type="password" id="apiKey" placeholder="输入你的 MinerU API Key">
                <div class="help-text">从 https://mineru.net 获取你的 API Key</div>
            </div>
            
            <div id="keyDisplay" style="display: none;">
                <div class="form-group">
                    <label>已配置的 API Key</label>
                    <div class="api-key-display" id="keyValue"></div>
                </div>
            </div>
            
            <div class="button-group">
                <button class="btn-primary" onclick="saveApiKey()">💾 保存 API Key</button>
                <button class="btn-test" onclick="testApiKey()">🧪 测试连接</button>
                <button class="btn-secondary" onclick="clearApiKey()">🗑️ 清除 API Key</button>
            </div>
            
            <div id="keyStatus" class="status"></div>
        </div>
        
        <!-- PDF 分片配置 -->
        <div class="card">
            <h2>📄 PDF 分片配置</h2>
            
            <div class="note">
                <strong>💡 提示：</strong> 当 PDF 文件超过大小或页数限制时，将自动分片处理以提高处理效率。
            </div>
            
            <div class="form-group checkbox">
                <input type="checkbox" id="chunkingEnabled" checked onchange="toggleChunkingSettings()">
                <label for="chunkingEnabled">启用 PDF 自动分片</label>
            </div>
            
            <div id="chunkingSettings">
                <div class="config-grid">
                    <div class="form-group">
                        <label>最大文件大小 (MB)</label>
                        <input type="number" id="maxFileSize" value="200" min="1">
                        <div class="help-text">文件超过此大小将被分片</div>
                    </div>
                    
                    <div class="form-group">
                        <label>最大页数</label>
                        <input type="number" id="maxPages" value="600" min="1">
                        <div class="help-text">页数超过此限制将被分片</div>
                    </div>
                </div>
                
                <div class="config-grid">
                    <div class="form-group">
                        <label>分片大小 (MB)</label>
                        <input type="number" id="chunkSize" value="100" min="1">
                        <div class="help-text">每个分片的目标大小</div>
                    </div>
                    
                    <div class="form-group">
                        <label>每分片最大页数</label>
                        <input type="number" id="maxPagesPerChunk" value="300" min="1">
                        <div class="help-text">每个分片包含的最大页数</div>
                    </div>
                </div>
            </div>
            
            <div class="button-group">
                <button class="btn-primary" onclick="saveChunkingConfig()">💾 保存分片配置</button>
                <button class="btn-secondary" onclick="resetChunkingConfig()">↩️ 重置为默认</button>
            </div>
            
            <div id="chunkingStatus" class="status"></div>
        </div>
        
        <!-- 当前配置信息 -->
        <div class="card">
            <h2>ℹ️ 当前配置</h2>
            <div id="configInfo" style="font-size: 13px; line-height: 1.8; color: #666;">
                <p>加载中...</p>
            </div>
            <button class="btn-secondary" onclick="loadConfig()" style="margin-top: 15px;">🔄 刷新</button>
        </div>
    </div>
    
    <script>
        // 页面加载时加载配置
        window.addEventListener('load', () => {
            loadConfig();
        });
        
        /**
         * 加载当前配置
         */
        async function loadConfig() {
            try {
                const response = await fetch('/api/config');
                const result = await response.json();
                
                if (result.code === 0) {
                    const config = result.data;
                    
                    // 显示 API Key 状态
                    if (config.has_api_key) {
                        document.getElementById('keyDisplay').style.display = 'block';
                        document.getElementById('keyValue').textContent = config.api_key;
                    } else {
                        document.getElementById('keyDisplay').style.display = 'none';
                    }
                    
                    // 加载分片配置
                    const chunking = config.pdf_chunking;
                    document.getElementById('chunkingEnabled').checked = chunking.enabled;
                    document.getElementById('maxFileSize').value = (chunking.max_file_size / (1024 * 1024)).toFixed(0);
                    document.getElementById('maxPages').value = chunking.max_pages;
                    document.getElementById('chunkSize').value = (chunking.chunk_size / (1024 * 1024)).toFixed(0);
                    document.getElementById('maxPagesPerChunk').value = chunking.max_pages_per_chunk;
                    
                    toggleChunkingSettings();
                    
                    // 更新配置信息
                    updateConfigInfo(config);
                }
            } catch (error) {
                console.error('加载配置失败:', error);
                showStatus('configInfo', 'error', '加载配置失败: ' + error.message);
            }
        }
        
        /**
         * 更新配置信息显示
         */
        function updateConfigInfo(config) {
            const chunking = config.pdf_chunking;
            const info = `
                <p><strong>API Key 状态：</strong> ${config.has_api_key ? '<span class="connection-status connected"></span>已配置' : '<span class="connection-status disconnected"></span>未配置'}</p>
                <p><strong>PDF 分片：</strong> ${chunking.enabled ? '✓ 已启用' : '✗ 已禁用'}</p>
                <p><strong>最大文件大小：</strong> ${(chunking.max_file_size / (1024 * 1024)).toFixed(0)} MB</p>
                <p><strong>最大页数：</strong> ${chunking.max_pages} 页</p>
                <p><strong>分片大小：</strong> ${(chunking.chunk_size / (1024 * 1024)).toFixed(0)} MB</p>
                <p><strong>每分片最大页数：</strong> ${chunking.max_pages_per_chunk} 页</p>
            `;
            document.getElementById('configInfo').innerHTML = info;
        }
        
        /**
         * 保存 API Key
         */
        async function saveApiKey() {
            const key = document.getElementById('apiKey').value.trim();
            
            if (!key) {
                showStatus('keyStatus', 'error', '❌ API Key 不能为空');
                return;
            }
            
            try {
                showStatus('keyStatus', 'info', '⏳ 保存中...');
                
                const response = await fetch('/api/config', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ api_key: key })
                });
                
                const result = await response.json();
                
                if (result.code === 0) {
                    showStatus('keyStatus', 'success', '✅ API Key 已保存');
                    document.getElementById('apiKey').value = '';
                    loadConfig();
                } else {
                    showStatus('keyStatus', 'error', '❌ ' + result.msg);
                }
            } catch (error) {
                showStatus('keyStatus', 'error', '❌ 保存失败: ' + error.message);
            }
        }
        
        /**
         * 测试 API Key
         */
        async function testApiKey() {
            try {
                showStatus('keyStatus', 'info', '⏳ 测试中...');
                
                const response = await fetch('/api/config/test-key', {
                    method: 'POST'
                });
                
                const result = await response.json();
                
                if (result.code === 0) {
                    showStatus('keyStatus', 'success', '✅ API Key 有效，连接成功！');
                } else {
                    showStatus('keyStatus', 'error', '❌ ' + result.msg);
                }
            } catch (error) {
                showStatus('keyStatus', 'error', '❌ 测试失败: ' + error.message);
            }
        }
        
        /**
         * 清除 API Key
         */
        async function clearApiKey() {
            if (!confirm('确定要删除 API Key 吗？')) {
                return;
            }
            
            try {
                showStatus('keyStatus', 'info', '⏳ 删除中...');
                
                const response = await fetch('/api/key', {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (result.code === 0) {
                    showStatus('keyStatus', 'success', '✅ API Key 已删除');
                    document.getElementById('apiKey').value = '';
                    document.getElementById('keyDisplay').style.display = 'none';
                    loadConfig();
                } else {
                    showStatus('keyStatus', 'error', '❌ ' + result.msg);
                }
            } catch (error) {
                showStatus('keyStatus', 'error', '❌ 删除失败: ' + error.message);
            }
        }
        
        /**
         * 保存分片配置
         */
        async function saveChunkingConfig() {
            const config = {
                enabled: document.getElementById('chunkingEnabled').checked,
                max_file_size: parseInt(document.getElementById('maxFileSize').value) * 1024 * 1024,
                max_pages: parseInt(document.getElementById('maxPages').value),
                chunk_size: parseInt(document.getElementById('chunkSize').value) * 1024 * 1024,
                max_pages_per_chunk: parseInt(document.getElementById('maxPagesPerChunk').value)
            };
            
            // 简单验证
            if (config.max_file_size <= 0 || config.max_pages <= 0 || 
                config.chunk_size <= 0 || config.max_pages_per_chunk <= 0) {
                showStatus('chunkingStatus', 'error', '❌ 所有值必须大于 0');
                return;
            }
            
            try {
                showStatus('chunkingStatus', 'info', '⏳ 保存中...');
                
                const response = await fetch('/api/config', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ pdf_chunking: config })
                });
                
                const result = await response.json();
                
                if (result.code === 0) {
                    showStatus('chunkingStatus', 'success', '✅ 分片配置已保存');
                    loadConfig();
                } else {
                    showStatus('chunkingStatus', 'error', '❌ ' + result.msg);
                }
            } catch (error) {
                showStatus('chunkingStatus', 'error', '❌ 保存失败: ' + error.message);
            }
        }
        
        /**
         * 重置分片配置
         */
        function resetChunkingConfig() {
            if (!confirm('确定要重置为默认配置吗？')) {
                return;
            }
            
            document.getElementById('maxFileSize').value = '200';
            document.getElementById('maxPages').value = '600';
            document.getElementById('chunkSize').value = '100';
            document.getElementById('maxPagesPerChunk').value = '300';
        }
        
        /**
         * 切换分片设置的显示
         */
        function toggleChunkingSettings() {
            const enabled = document.getElementById('chunkingEnabled').checked;
            const settings = document.getElementById('chunkingSettings');
            settings.style.opacity = enabled ? '1' : '0.5';
            
            const inputs = settings.querySelectorAll('input');
            inputs.forEach(input => {
                input.disabled = !enabled;
            });
        }
        
        /**
         * 显示状态消息
         */
        function showStatus(elementId, type, message) {
            const element = document.getElementById(elementId);
            element.className = `status ${type}`;
            element.textContent = message;
            
            // 3 秒后自动隐藏（除非是错误）
            if (type !== 'error') {
                setTimeout(() => {
                    element.className = 'status';
                }, 3000);
            }
        }
    </script>
</body>
</html>
