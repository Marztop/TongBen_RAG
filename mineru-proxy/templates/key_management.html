<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mineru API Key 管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .key-input-wrapper {
            position: relative;
        }

        .toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #667eea;
            font-size: 18px;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-delete {
            background: #f5f5f5;
            color: #d32f2f;
        }

        .btn-delete:hover {
            background: #ffebee;
        }

        .status {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }

        .status.error {
            background: #ffebee;
            color: #d32f2f;
            border: 1px solid #ef9a9a;
        }

        .status.info {
            background: #e3f2fd;
            color: #1565c0;
            border: 1px solid #90caf9;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 15px;
        }

        .badge-active {
            background: #c8e6c9;
            color: #1b5e20;
        }

        .badge-inactive {
            background: #ffcdd2;
            color: #b71c1c;
        }

        .hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 14px;
            margin-top: 10px;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .api-status {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 6px;
            font-size: 13px;
        }

        .api-status-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding: 5px 0;
        }

        .api-status-item:last-child {
            margin-bottom: 0;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .dot-active {
            background: #4caf50;
        }

        .dot-inactive {
            background: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 API Key 管理</h1>
        <p class="subtitle">Mineru 官方 API 密钥配置</p>

        <div id="status" class="status"></div>

        <form id="keyForm">
            <div class="form-group">
                <label for="apiKey">API Key</label>
                <div class="key-input-wrapper">
                    <input
                        type="text"
                        id="apiKey"
                        placeholder="输入您的 Mineru API Key"
                        autocomplete="off"
                    >
                    <button type="button" class="toggle-btn" id="toggleBtn" style="display:none;">👁️</button>
                </div>
                <div class="hint">从 mineru.net 获取您的 API Key（明文显示）</div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-save">💾 保存</button>
                <button type="button" class="btn-delete" id="deleteBtn">🗑️ 删除</button>
            </div>

            <div class="loading" id="loading">
                <span class="spinner"></span>处理中...
            </div>
        </form>

        <div class="api-status">
            <div class="api-status-item">
                <span>API Key 状态</span>
                <span>
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">未设置</span>
                </span>
            </div>
            <div class="api-status-item">
                <span>API 连接</span>
                <span>
                    <span class="status-dot" id="apiDot"></span>
                    <span id="apiText">检查中...</span>
                </span>
            </div>
        </div>
    </div>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        const toggleBtn = document.getElementById('toggleBtn');
        const deleteBtn = document.getElementById('deleteBtn');
        const keyForm = document.getElementById('keyForm');
        const statusDiv = document.getElementById('status');
        const loadingDiv = document.getElementById('loading');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const apiDot = document.getElementById('apiDot');
        const apiText = document.getElementById('apiText');

        // API Key 已改为明文显示，不需要切换
        // toggleBtn 已隐藏

        // 加载初始状态
        function loadKeyStatus() {
            fetch('/api/key')
                .then(res => res.json())
                .then(data => {
                    if (data.data && data.data.key) {
                        apiKeyInput.value = data.data.key;  // 显示完整的 API Key
                        updateStatusUI(data.data.has_key);
                    }
                })
                .catch(console.error);
        }

        // 检查 API 连接
        function checkApiConnection() {
            fetch('/api/key/test', { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    const isConnected = data.code === 0;
                    apiDot.className = isConnected ? 'status-dot dot-active' : 'status-dot dot-inactive';
                    apiText.textContent = isConnected ? '✅ 连接成功' : '❌ 连接失败';
                })
                .catch(() => {
                    apiDot.className = 'status-dot dot-inactive';
                    apiText.textContent = '❌ 连接失败';
                });
        }

        // 更新状态 UI
        function updateStatusUI(hasKey) {
            if (hasKey) {
                statusDot.className = 'status-dot dot-active';
                statusText.textContent = '✅ 已设置';
            } else {
                statusDot.className = 'status-dot dot-inactive';
                statusText.textContent = '❌ 未设置';
            }
        }

        // 显示消息
        function showMessage(msg, type = 'info') {
            statusDiv.textContent = msg;
            statusDiv.className = `status show ${type}`;
            setTimeout(() => {
                statusDiv.classList.remove('show');
            }, 3000);
        }

        // 保存 API Key
        keyForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const key = apiKeyInput.value.trim();

            if (!key) {
                showMessage('❌ API Key 不能为空', 'error');
                return;
            }

            loadingDiv.style.display = 'block';

            try {
                const response = await fetch('/api/key', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key })
                });

                const data = await response.json();

                if (data.code === 0) {
                    showMessage('✅ API Key 保存成功', 'success');
                    updateStatusUI(true);
                    setTimeout(checkApiConnection, 500);
                } else {
                    showMessage(`❌ 保存失败: ${data.msg}`, 'error');
                }
            } catch (err) {
                showMessage(`❌ 错误: ${err.message}`, 'error');
            } finally {
                loadingDiv.style.display = 'none';
            }
        });

        // 删除 API Key
        deleteBtn.addEventListener('click', async (e) => {
            e.preventDefault();

            if (!confirm('⚠️ 确定要删除 API Key 吗？')) {
                return;
            }

            loadingDiv.style.display = 'block';

            try {
                const response = await fetch('/api/key', { method: 'DELETE' });
                const data = await response.json();

                if (data.code === 0) {
                    apiKeyInput.value = '';
                    showMessage('✅ API Key 已删除', 'success');
                    updateStatusUI(false);
                    apiDot.className = 'status-dot dot-inactive';
                    apiText.textContent = '❌ 连接失败';
                } else {
                    showMessage(`❌ 删除失败: ${data.msg}`, 'error');
                }
            } catch (err) {
                showMessage(`❌ 错误: ${err.message}`, 'error');
            } finally {
                loadingDiv.style.display = 'none';
            }
        });

        // 初始化
        loadKeyStatus();
        checkApiConnection();

        // 只在以下情况检查 API 连接，不再定时检查：
        // 1. 页面加载时 - 上面已调用 checkApiConnection()
        // 2. 保存 API Key 后 - 在 keyForm.addEventListener 中调用
        // 3. 手动点击测试时 - 如需要可在此添加
    </script>
</body>
</html>
