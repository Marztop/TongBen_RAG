version: '3.8'

services:
  mineru-proxy:
    build: .
    container_name: mineru-proxy
    ports:
      - "${DOCKER_PROXY_PORT:-8081}:5000"
    environment:
      - MINERU_API_KEY=${MINERU_API_KEY}
      - MINERU_API_URL=${MINERU_API_URL:-https://mineru.net}
      - PROXY_PORT=${PROXY_PORT:-5000}
      - PROXY_HOST=${PROXY_HOST:-0.0.0.0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - CACHE_TTL=${CACHE_TTL:-3600}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-30}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - TEMP_DIR=${TEMP_DIR:-/tmp/mineru_proxy}
    volumes:
      - ./cache:/app/cache
      - ./keys.json:/app/keys.json
      - ./config.json:/app/config.json
      - ./logs:/app/logs
      - /tmp/mineru_proxy:/tmp/mineru_proxy
    restart: unless-stopped
    networks:
      - default
